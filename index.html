<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ARC Raiders Raid Planner</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:linear-gradient(135deg,#ffe6c7,#ffd4a2);
color:#222;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.loot-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:10px;
}

.loot-item{
background:#fafafa;
border-radius:10px;
padding:10px;
text-align:center;
border:1px solid #ddd;
}

.loot-item img{
width:60px;
height:60px;
object-fit:contain;
display:block;
margin:auto;
}

select,input{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
}

.badge{
display:inline-block;
background:#ff7a00;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-right:6px;
margin-bottom:4px;
}

.summary{
background:#fff7ed;
padding:12px;
border-radius:10px;
font-size:13px;
white-space:pre-wrap;
}

button{
background:#ff7a00;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
}

@media(max-width:800px){
.grid{grid-template-columns:1fr;}
.loot-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="container">

<h1>ARC Raiders Raid Planner</h1>

<div class="grid">

<div class="card">

<label>Player</label>
<input id="player" value="Jarno">

<label>Weapon Goal</label>
<input id="weapon" value="Stitcher IV">

<label>Raid Package</label>
<select id="package">
<option value="loot">Loot Run</option>
<option value="rebuild">Rebuild</option>
<option value="pvp">PvP Push</option>
<option value="trials">Trials</option>
<option value="weapon">Weapon Upgrade</option>
</select>

<label>Spawn</label>
<select id="spawn">
<option value="dam">Dam</option>
<option value="spaceport">Spaceport</option>
<option value="bluegate">Blue Gate</option>
<option value="stella">Stella Montis</option>
<option value="buried">Buried City</option>
</select>

</div>

<div class="card">

<h3>Raid Snapshot</h3>

<div id="priority" class="loot-grid"></div>

<h4>Safe Pocket</h4>
<div id="safe"></div>

<h4>Consumables</h4>
<div id="cons"></div>

<h4>Weapon Goal</h4>
<div id="weaponText"></div>

</div>

</div>

<div class="card">

<h3>Raid Summary</h3>
<div id="summary" class="summary"></div>
<button onclick="copySummary()">Copy Raid Plan</button>

</div>

</div>

<script>

const packages={
loot:{
target:["Battery","Magnets","Wires","Crude Oil","Canister"],
safe:["Battery","Magnets"],
cons:["Bandage","Stim"]
},
rebuild:{
target:["Battery","Magnets","Wires","Bandage"],
safe:["Battery","Magnets","Stim"],
cons:["Bandage","Stim"]
},
pvp:{
target:["Shield Charger","Bandage","Stim","Medium Gun Parts"],
safe:["Stim","Bandage"],
cons:["Bandage","Shield Charger","Stim"]
},
trials:{
target:["Stim","Bandage","Shield Charger","Battery"],
safe:["Stim","Bandage"],
cons:["Stim","Bandage"]
},
weapon:{
target:["Medium Gun Parts","Heavy Gun Parts","Battery"],
safe:["Battery","Magnets"],
cons:["Bandage","Stim"]
}
};

const spawns={
dam:"Industrial path → oil area → weapon parts → extract",
spaceport:"Electronics loop → containers → extract",
bluegate:"Utility line → components → extract",
stella:"Medical path → supplies → extract",
buried:"High risk rare loot → extract fast"
};

function update(){

const pkg=document.getElementById("package").value;
const spawn=document.getElementById("spawn").value;
const player=document.getElementById("player").value;
const weapon=document.getElementById("weapon").value;

const p=packages[pkg];

const lootDiv=document.getElementById("priority");
lootDiv.innerHTML="";

p.target.slice(0,6).forEach(l=>{
const div=document.createElement("div");
div.className="loot-item";
div.innerHTML=`<strong>${l}</strong>`;
lootDiv.appendChild(div);
});

const safe=document.getElementById("safe");
safe.innerHTML="";
p.safe.forEach(s=>{
safe.innerHTML+=`<span class="badge">${s}</span>`;
});

const cons=document.getElementById("cons");
cons.innerHTML="";
p.cons.forEach(s=>{
cons.innerHTML+=`<span class="badge">${s}</span>`;
});

document.getElementById("weaponText").innerText=weapon;

const summary=`ARC RAID PLAN
Player: ${player}
Package: ${pkg}
Spawn: ${spawn}
Priority Loot: ${p.target.join(", ")}
Safe Pocket: ${p.safe.join(", ")}
Consumables: ${p.cons.join(", ")}
Weapon Goal: ${weapon}
Route: ${spawns[spawn]}
`;

document.getElementById("summary").innerText=summary;

}

function copySummary(){
navigator.clipboard.writeText(
document.getElementById("summary").innerText
);
alert("Raid plan copied!");
}

document.querySelectorAll("select,input").forEach(e=>{
e.addEventListener("change",update);
});

update();

</script>

</body>
</html>
