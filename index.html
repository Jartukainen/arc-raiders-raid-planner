<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARC Raiders Raid Planner</title>
<style>
:root{
--bg1:#050a1a;
--bg2:#0b1d3a;
--card:#0f2447;
--card2:#132c56;
--text:#e9f1ff;
--muted:#a6b7e4;
--line:rgba(255,255,255,.08);
--arc-red:#ff4d4d;
--arc-orange:#ff8a00;
--arc-yellow:#ffd84d;
--arc-green:#47ffb1;
--arc-blue:#47cfff;
}

*{box-sizing:border-box;font-family:Inter,system-ui,Arial}
body{
margin:0;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
}

.app{
max-width:1400px;
margin:auto;
padding:28px;
}

h1{font-size:44px;margin:0 0 8px}
.subtitle{color:var(--muted);margin-bottom:30px}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:24px;
}

.card{
background:linear-gradient(180deg,var(--card),var(--card2));
border:1px solid var(--line);
border-radius:20px;
padding:20px;
}

.card-title{
font-size:20px;
margin-bottom:16px;
}

label{
display:block;
font-size:12px;
letter-spacing:.08em;
text-transform:uppercase;
margin-top:12px;
margin-bottom:6px;
color:#bcd0ff;
}

input,select{
width:100%;
padding:10px 12px;
border-radius:10px;
border:1px solid var(--line);
background:#0b1d3a;
color:white;
}

button{
margin-top:10px;
padding:10px 14px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,var(--arc-orange),var(--arc-yellow));
font-weight:700;
cursor:pointer;
}

.snapshot-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.box{
background:#0a1a36;
padding:16px;
border-radius:14px;
border:1px solid var(--line);
}

.box h3{margin-top:0;font-size:14px;color:#bcd0ff}

.pill{
display:inline-block;
margin:4px;
padding:6px 10px;
border-radius:20px;
background:linear-gradient(90deg,var(--arc-red),var(--arc-orange));
font-size:12px;
font-weight:700;
color:black;
}

.stash-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.stash-item{
background:#0a1a36;
padding:10px;
border-radius:10px;
border:1px solid var(--line);
}

.workbench-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

.workbench-card{
background:#0a1a36;
padding:14px;
border-radius:14px;
border:1px solid var(--line);
}

.summary{
white-space:pre-wrap;
background:#07162f;
padding:16px;
border-radius:14px;
border:1px solid var(--line);
margin-top:16px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
.stash-grid{grid-template-columns:repeat(2,1fr)}
.workbench-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="app">
<h1>ARC Raiders Raid Planner</h1>
<div class="subtitle">Second screen raid helper. Plan loot, stash and upgrades before dropping into Speranza.</div>

<div class="grid">

<div class="card">
<div class="card-title">Loadout Setup</div>

<label>Profile</label>
<select id="profile"></select>
<button id="newProfile">New Profile</button>

<label>Player</label>
<input id="player" />

<label>Weapon Goal</label>
<select id="weapon"></select>

<label>Raid Package</label>
<select id="package"></select>

<label>Spawn</label>
<select id="spawn"></select>

<label>Progress Stage</label>
<select id="stage">
<option>Season Start</option>
<option>Mid Progress</option>
<option>Endgame</option>
</select>

</div>

<div>

<div class="card">
<div class="card-title">Raid Snapshot</div>

<div class="snapshot-grid">

<div class="box">
<h3>Route</h3>
<div id="route"></div>
</div>

<div class="box">
<h3>Priority Loot</h3>
<div id="loot"></div>
</div>

<div class="box">
<h3>Safe Pocket</h3>
<div id="safe"></div>
</div>

<div class="box">
<h3>Consumables</h3>
<div id="cons"></div>
</div>

</div>

<div class="box" style="margin-top:16px">
<h3>Weapon Goal</h3>
<div id="weaponGoal"></div>
</div>

</div>

<div class="card" style="margin-top:20px">
<div class="card-title">Stash Tracker</div>
<div class="stash-grid" id="stash"></div>
</div>

<div class="card" style="margin-top:20px">
<div class="card-title">Workbench Planner</div>
<div class="workbench-grid" id="workbench"></div>
</div>

<div class="card" style="margin-top:20px">
<div class="card-title">Raid Plan</div>
<div class="summary" id="summary"></div>
<button id="copy">Copy Raid Plan</button>
</div>

</div>

</div>
</div>

<script>

const weapons=[
"Stitcher IV","Il Toro IV","Equalizer IV","Arpeggio IV","Anvil IV","Mistral IV","Aphelion Rifle"
];

const packages={
"PvP Push":{
loot:["Medium Gun Parts","Battery","Magnets"],
safe:["Stim","Bandage"],
cons:["Bandage","Stim"]
},
"Rebuild":{
loot:["Metal Parts","Fabric","Plastic Parts"],
safe:["Battery"],
cons:["Bandage"]
}
};

const spawns={
"Spaceport":["Spawn","Electronics loop","Containers","Extract"],
"Dam":["Spawn","Turbines","Storage","Extract"]
};

const stashItems=[
"Battery","Magnets","Wires","Metal Parts","Fabric","Plastic Parts","Rubber Parts","ARC Alloy","Chemicals"
];

const workbenches=[
"Gunsmith","Gear Bench","Medical Lab","Utility Station","Explosives Station","Refiner"
];

let profiles={
"Jartukainen":{
player:"Jartukainen",
weapon:"Stitcher IV",
package:"PvP Push",
spawn:"Spaceport",
stash:{}
}
};

stashItems.forEach(i=>profiles.Jartukainen.stash[i]=0);

const profileSel=document.getElementById("profile");
const playerInput=document.getElementById("player");
const weaponSel=document.getElementById("weapon");
const packageSel=document.getElementById("package");
const spawnSel=document.getElementById("spawn");

const routeBox=document.getElementById("route");
const lootBox=document.getElementById("loot");
const safeBox=document.getElementById("safe");
const consBox=document.getElementById("cons");
const weaponGoal=document.getElementById("weaponGoal");

const stashGrid=document.getElementById("stash");
const workbenchGrid=document.getElementById("workbench");
const summary=document.getElementById("summary");

function init(){

weapons.forEach(w=>{
let o=document.createElement("option");
o.textContent=w;
weaponSel.appendChild(o);
});

Object.keys(packages).forEach(p=>{
let o=document.createElement("option");
o.textContent=p;
packageSel.appendChild(o);
});

Object.keys(spawns).forEach(s=>{
let o=document.createElement("option");
o.textContent=s;
spawnSel.appendChild(o);
});

Object.keys(profiles).forEach(p=>{
let o=document.createElement("option");
o.textContent=p;
profileSel.appendChild(o);
});

renderStash();
renderWorkbench();
loadProfile(profileSel.value);
update();
}

function renderStash(){

stashItems.forEach(item=>{

let div=document.createElement("div");
div.className="stash-item";

let label=document.createElement("div");
label.textContent=item;

let input=document.createElement("input");
input.type="number";
input.value=0;

input.oninput=()=>{
profiles[profileSel.value].stash[item]=Number(input.value);
update();
}


div.appendChild(label);
div.appendChild(input);
stashGrid.appendChild(div);

});

}

function renderWorkbench(){

workbenches.forEach(w=>{

let div=document.createElement("div");
div.className="workbench-card";
div.innerHTML=`<strong>${w}</strong><div style="margin-top:6px;color:#9bb0e3">upgrade planner</div>`;

workbenchGrid.appendChild(div);

});

}

function loadProfile(name){
let p=profiles[name];
playerInput.value=p.player;
weaponSel.value=p.weapon;
packageSel.value=p.package;
spawnSel.value=p.spawn;
}

function update(){

let p=profiles[profileSel.value];

let pkg=packages[p.package];
let route=spawns[p.spawn];

routeBox.innerHTML="";
route.forEach(r=>routeBox.innerHTML+=`<div>${r}</div>`);

lootBox.innerHTML="";
pkg.loot.forEach(i=>lootBox.innerHTML+=`<span class='pill'>${i}</span>`);

safeBox.innerHTML="";
pkg.safe.forEach(i=>safeBox.innerHTML+=`<span class='pill'>${i}</span>`);

consBox.innerHTML="";
pkg.cons.forEach(i=>consBox.innerHTML+=`<span class='pill'>${i}</span>`);

weaponGoal.textContent=p.weapon;

summary.textContent=`ARC RAID PLAN
Player: ${p.player}
Package: ${p.package}
Spawn: ${p.spawn}
Weapon Goal: ${p.weapon}
Route: ${route.join(" -> ")}`;

}

playerInput.oninput=()=>{profiles[profileSel.value].player=playerInput.value;update();}
weaponSel.onchange=()=>{profiles[profileSel.value].weapon=weaponSel.value;update();}
packageSel.onchange=()=>{profiles[profileSel.value].package=packageSel.value;update();}
spawnSel.onchange=()=>{profiles[profileSel.value].spawn=spawnSel.value;update();}
profileSel.onchange=()=>loadProfile(profileSel.value);

init();

</script>

</body>
</html>
