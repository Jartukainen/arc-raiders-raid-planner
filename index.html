<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARC Raiders Planner</title>
</head>

<body style="background:#0b1635;color:white;font-family:Arial;padding:30px;">

<h2>ARC Raiders Planner Test</h2>

<label>Profile</label>
<select id="profile"></select>

<br><br>

<label>Weapon</label>
<select id="weapon"></select>

<br><br>

<label>Raid Package</label>
<select id="package"></select>

<br><br>

<label>Spawn</label>
<select id="spawn"></select>

<script>

const profiles = ["Jartukainen","Teammate"];

const weapons = [
"Stitcher IV",
"Il Toro IV",
"Equalizer IV",
"Arpeggio IV",
"Anvil IV",
"Mistral IV",
"Aphelion Rifle"
];

const packages = [
"Loot Run",
"Rebuild",
"PvP Push",
"Trials",
"Weapon Upgrade"
];

const spawns = [
"Dam",
"Spaceport",
"Blue Gate",
"Stella Montis",
"Buried City"
];

function fill(select,list){
list.forEach(v=>{
let o=document.createElement("option");
o.textContent=v;
select.appendChild(o);
});
}

fill(document.getElementById("profile"),profiles);
fill(document.getElementById("weapon"),weapons);
fill(document.getElementById("package"),packages);
fill(document.getElementById("spawn"),spawns);

</script>

</body>
</html>
